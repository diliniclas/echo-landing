<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Echo — coming soon</title>
<meta name="description" content="Echo reads the message on your screen and drafts a reply in your tone of voice. Coming soon." />
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #111418;
    --muted: #6b7280;
    --bg: #ffffff;
    --bg-soft: #f6f7f8;
    --brand: #0fbf6a;
    --brand-soft: #c9f5dd;
    --line: #e7e7e7;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: 'Poppins', system-ui, sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .card {
    max-width: 480px;
  }
  .brand-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .brand-mark img {
    border-radius: 8px;
    flex-shrink: 0;
  }
  .pill {
    display: inline-block;
    margin-top: 18px;
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--brand-soft);
    color: var(--brand);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  h1 {
    font-size: 32px;
    font-weight: 600;
    line-height: 1.25;
    margin: 18px 0 10px;
  }
  p.lead {
    color: var(--muted);
    font-size: 16px;
    line-height: 1.6;
    margin: 0 0 28px;
  }
  .contact {
    font-size: 14px;
    color: var(--muted);
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }
  .contact a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: none;
  }
  .contact a:hover { color: var(--brand); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand-mark">
      <img src="assets/icon.svg" alt="Echo" width="40" height="40">
      echo
    </div>
    <span class="pill">Coming soon</span>
    <h1>Reply to anything, in seconds.</h1>
    <p class="lead">
      Echo reads whatever's on your screen and drafts a reply in your own tone of voice.
      We're putting the finishing touches on it — check back soon.
    </p>
    <div class="contact">
      Questions? <a href="mailto:contact@echotxt.ai">contact@echotxt.ai</a>
    </div>
    <div class="contact" style="border-top:none;padding-top:12px;font-size:13px;">
      <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Service</a>
    </div>
  </div>
</body>
</html>
